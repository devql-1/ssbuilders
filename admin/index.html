<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SS Builders Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/decap-cms@3.1.10/dist/decap-cms.min.css?v=20260703c" />
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.10/dist/decap-cms.min.js?v=20260703c"></script>
  <script>
    if (typeof CMS !== "undefined") {
      CMS.init();
    } else {
      window.addEventListener("load", function() {
        if (typeof CMS !== "undefined") {
          CMS.init();
        } else {
          document.body.innerHTML = '<div style="padding:40px;text-align:center;"><h2>CMS failed to load</h2><p>Please wait a minute and refresh.</p></div>';
        }
      });
    }
  </script>
</body>
</html>
