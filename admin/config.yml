backend:
  name: github
  repo: devql-1/ssbuilders
  branch: main
  site_domain: devql-1.github.io

media_folder: images
public_folder: /images

collections:
  - name: "site-content"
    label: "Site Content"
    files:
      - label: "Hero & About"
        name: "hero-about"
        file: "content/hero-about.json"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "text"}
          - {label: "About Title", name: "aboutTitle", widget: "string"}
          - {label: "About Description", name: "aboutDesc", widget: "text"}
      - label: "Contact Info"
        name: "contact-info"
        file: "content/contact.json"
        fields:
          - {label: "Address", name: "address", widget: "text"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Office Hours", name: "hours", widget: "string"}

  - name: "properties"
    label: "Properties"
    files:
      - label: "All Properties"
        name: "properties-list"
        file: "content/properties/properties.json"
        fields:
          - {label: "Properties (JSON Array)", name: "properties", widget: "json", required: false}
